---
layout: default
pagination: 
  enabled: true
---

<div class="home"></div>

<div class="site-header-container {% if site.cover %}has-cover{% endif %}" {% if site.cover %}style="background-image: url({{ site.cover | prepend: site.baseurl }});"{% endif %}>
  <div class="scrim {% if site.cover %}has-cover{% endif %}">
    <header class="site-header">
      <h1 class="title">{{ site.title }}</h1>
      {% if site.subtitle %}<p class="subtitle"> <span class="typing" style="font-weight: 300; color:#e4dde6"></span> PhD Student</p>{% endif %}
    </header>
  </div>
</div>

<!-- typed.js class -->
<script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
<script type="text/javascript">
    var typed = new Typed('.typing',{
    strings: ["third-year","third-year"],
    loop: true,
    typeSpeed: 50,
    backSpeed: 50,
  });
</script>
