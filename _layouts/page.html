---
layout: default
---

<div class="page">
  <div class="page-header-container {% if page.cover %}has-cover{% endif %}" {% if page.cover %}style="background-image: url({{ page.cover | prepend: site.baseurl }});"{% endif %}>
    <div class="scrim {% if page.cover %}has-cover{% endif %}">
        <header class="post-header">
          <h1 class="title">{{ page.title }}</h1>
        </header>
    </div>
  </div>
    


{% include page_divider.html %}
<div class="wrapper">
  <article class="page-content">
    {{ content }}
  </article>

</div>
</div>
